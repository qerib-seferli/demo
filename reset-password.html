<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifrəni yenilə - ELİT AVTO 777</title>

                          <link rel="manifest" href="./site.webmanifest">
                          <meta name="theme-color" content="#0b0f19">
                          <link rel="apple-touch-icon" href="./foto/icon-192.png">
                          <meta name="apple-mobile-web-app-capable" content="yes">
                          <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                          <meta name="apple-mobile-web-app-title" content="ELIT AVTO">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="reset-password">
  <header class="site-header">
    <div class="container header-row compact-header">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/elit_avto_777_logo.png" alt="ELİT AVTO 777">
        <div>
          <h2>ELİT AVTO 777</h2>
          <p>Şifrəni yenilə</p>
        </div>
      </a>
      <a href="login.html" class="btn btn-outline btn-small">Giriş</a>
    </div>
  </header>

  <main class="page">
    <div class="container auth-shell">
      <section class="form-card auth-card-pro">
        <div class="section-head slim-head">
          <h3><i class="fa-solid fa-key"></i> Yeni şifrə təyin et</h3>
        </div>

        <form id="resetPasswordForm" class="compact-form-stack">
          <div class="field">
            <label>Yeni şifrə</label>
            <input id="newPassword" type="password" placeholder="Yeni şifrəni yazın" required>
          </div>

          <div class="field">
            <label>Yeni şifrə təkrar</label>
            <input id="confirmNewPassword" type="password" placeholder="Şifrəni təkrar yazın" required>
          </div>

          <div class="filter-actions single-action">
            <button class="btn full-btn" type="submit">
              <i class="fa-solid fa-check"></i> Şifrəni yenilə
            </button>
          </div>
        </form>

        <p id="resetPasswordMsg" class="muted auth-message"></p>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
