<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş / Qeydiyyat - ELİT AVTO 777</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/logo.png" alt="ELİT AVTO 777">
        <div><h2>ELİT AVTO 777</h2><p>Giriş və Qeydiyyat</p></div>
      </a>
      <a href="index.html" class="btn btn-outline btn-small">Əsas Səhifə</a>
    </div>
  </header>

  <main class="page">
    <div class="container auth-shell">
      <section class="form-card">
        <div class="auth-tabs">
          <button class="btn" id="tabLogin">Giriş</button>
          <button class="btn btn-outline" id="tabRegister">Qeydiyyat</button>
        </div>

        <div class="auth-tabs">
          <button class="btn btn-small" id="modeEmail">Email</button>
          <button class="btn btn-outline btn-small" id="modePhone">Telefon OTP</button>
        </div>

        <form id="loginForm" class="hidden">
          <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="mail@example.com" required></div>
          <div class="field"><label>Şifrə</label><input type="password" id="loginPassword" placeholder="******" required></div>
          <div class="filter-actions"><button class="btn" type="submit">Daxil ol</button></div>
        </form>

        <form id="registerForm" class="hidden">
          <div class="field-inline">
            <div class="field"><label>Ad</label><input type="text" id="regName" required></div>
            <div class="field"><label>Soyad</label><input type="text" id="regSurname" required></div>
          </div>
          <div class="field-inline">
            <div class="field"><label>Email</label><input type="email" id="regEmail"></div>
            <div class="field"><label>Telefon</label><input type="tel" id="regPhone" placeholder="+994501112233"></div>
          </div>
          <div class="field"><label>Şifrə</label><input type="password" id="regPassword" required></div>
          <div class="filter-actions"><button class="btn" type="submit">Qeydiyyatdan keç</button></div>
        </form>

        <form id="phoneForm" class="hidden">
          <div class="field"><label>Telefon nömrəsi</label><input type="tel" id="otpPhone" placeholder="+994501112233"></div>
          <div class="field"><label>OTP kodu (gəlibsə)</label><input type="text" id="otpCode" placeholder="123456"></div>
          <div class="filter-actions">
            <button class="btn" type="button" id="sendOtpBtn">OTP göndər</button>
            <button class="btn btn-outline" type="button" id="verifyOtpBtn">OTP təsdiq et</button>
          </div>
          <p class="muted">Qeyd: Bu rejim işləsin deyə Supabase Auth daxilində Phone provider aktiv edilməlidir.</p>
        </form>

        <p id="authMsg" class="muted"></p>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
