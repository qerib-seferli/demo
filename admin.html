<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Panel | ELİT AVTO 777</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="topbar" id="site-header"></header>

  <main class="page-shell">
    <div class="admin-layout">
      <section class="admin-card">
        <div class="section-title">
          <h2>Elan əlavə et / redaktə et</h2>
        </div>

        <form id="listing-form" class="search-box">
          <input type="hidden" name="listing_id">
          <div class="grid-2">
            <input type="text" name="brand" placeholder="Marka" required>
            <input type="text" name="model" placeholder="Model" required>
          </div>
          <div class="grid-2">
            <input type="number" name="year" placeholder="Buraxılış ili" required>
            <input type="text" name="engine" placeholder="Mühərrik (məs: 2.0 Turbo)">
          </div>
          <div class="grid-2">
            <input type="number" name="mileage" placeholder="Yürüş (km)">
            <select name="condition">
              <option value="Sürülmüş">Sürülmüş</option>
              <option value="Yeni">Yeni</option>
            </select>
          </div>
          <div class="grid-2">
            <input type="number" step="0.01" name="price" placeholder="Qiymət" required>
            <select name="currency">
              <option>AZN</option>
              <option>USD</option>
              <option>EUR</option>
            </select>
          </div>
          <div class="grid-2">
            <select name="fuel_type">
              <option>Benzin</option>
              <option>Dizel</option>
              <option>Hibrid</option>
              <option>Plug-in Hybrid</option>
              <option>Elektrik</option>
              <option>Qaz</option>
            </select>
            <input type="text" name="color" placeholder="Rəng">
          </div>
          <div class="grid-2">
            <label class="meta-chip"><input type="checkbox" name="is_credit"> Kredit var</label>
            <label class="meta-chip"><input type="checkbox" name="is_barter"> Barter var</label>
          </div>
          <textarea name="description" rows="5" placeholder="Ətraflı açıqlama"></textarea>
          <textarea name="note" rows="3" placeholder="Admin qeydi"></textarea>
          <input type="file" name="images" id="listing-images" multiple accept="image/*">
          <p class="upload-note">Şəkillər Supabase Storage içində <b>listing-images</b> bucket-ə yüklənəcək.</p>
          <div class="grid-2">
            <button class="pill-btn" type="submit">Yadda saxla</button>
            <button class="pill-btn soft-btn" type="button" id="reset-listing-form">Formu təmizlə</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <div class="section-title">
          <h2>Panel</h2>
        </div>
        <div class="search-box">
          <button class="pill-btn soft-btn" id="load-admin-listings">Elanları yenilə</button>
          <button class="pill-btn soft-btn" id="load-admin-users">İstifadəçilər</button>
          <button class="pill-btn soft-btn" id="load-admin-messages">Mesajlar</button>
        </div>
      </section>
    </div>

    <section class="admin-card" style="margin-top:14px;">
      <div class="section-title">
        <h2>Mövcud elanlar</h2>
      </div>
      <div id="admin-listings" class="admin-list"></div>
    </section>

    <section class="admin-card" style="margin-top:14px;">
      <div class="section-title">
        <h2>İstifadəçilər</h2>
      </div>
      <div id="admin-users" class="admin-list"></div>
    </section>

    <section class="admin-card" style="margin-top:14px;">
      <div class="section-title">
        <h2>Mesaj mərkəzi</h2>
      </div>
      <div id="admin-chats" class="admin-list"></div>
    </section>
  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <div class="modal" id="chat-modal">
    <div class="modal-sheet">
      <div class="section-title">
        <h2>Admin cavabı</h2>
        <button class="icon-btn" id="close-chat"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="grid-2">
        <input id="chat-input" placeholder="Cavab yazın...">
        <button class="pill-btn" id="chat-send">Göndər</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
