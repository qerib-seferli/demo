<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - ELİT AVTO 777</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/logo.png" alt="ELİT AVTO 777">
        <div><h2>ELİT AVTO 777</h2><p>Admin idarə paneli</p></div>
      </a>
      <a href="profile.html" class="btn btn-outline btn-small">Profil</a>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="kpi-grid" style="margin-bottom:14px;">
        <div class="kpi"><strong id="adminTotalListings">0</strong><span>Elan sayı</span></div>
        <div class="kpi"><strong id="adminTotalUsers">0</strong><span>İstifadəçi</span></div>
        <div class="kpi"><strong id="adminTotalMessages">0</strong><span>Mesaj</span></div>
      </div>

      <div class="admin-grid">
        <section class="form-card">
          <h3>Yeni elan əlavə et / redaktə et</h3>
          <form id="listingForm">
            <input type="hidden" id="listingId">
            <div class="field-inline">
              <div class="field"><label>Marka</label><input id="carBrand" required></div>
              <div class="field"><label>Model</label><input id="carModel" required></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>Qiymət</label><input id="carPrice" type="number" required></div>
              <div class="field"><label>Valyuta</label><select id="carCurrency"><option>AZN</option><option>USD</option><option>EUR</option></select></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>İl</label><input id="carYear" type="number" required></div>
              <div class="field"><label>Yürüş (km)</label><input id="carMileage" type="number"></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>Mühərrik</label><input id="carEngine" placeholder="2.0 Turbo"></div>
              <div class="field"><label>Yanacaq</label><select id="carFuel"><option>Benzin</option><option>Dizel</option><option>Qaz</option><option>Hibrid</option><option>Elektrik</option></select></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>Sürətlər qutusu</label><input id="carTransmission" placeholder="Avtomat"></div>
              <div class="field"><label>Rəng</label><input id="carColor" placeholder="Qara"></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>Vəziyyət</label><select id="carCondition"><option>Yeni</option><option>Sürülmüş</option></select></div>
              <div class="field"><label>Ban növü</label><input id="carBodyType" placeholder="Sedan"></div>
            </div>
            <div class="field-inline">
              <div class="field"><label>Kredit</label><select id="carCredit"><option value="false">Xeyr</option><option value="true">Bəli</option></select></div>
              <div class="field"><label>Barter</label><select id="carBarter"><option value="false">Xeyr</option><option value="true">Bəli</option></select></div>
            </div>
            <div class="field"><label>Şəkillər</label><input id="carImages" type="file" accept="image/*" multiple></div>
            <div class="field"><label>Elit Avto 777 qeydi</label><textarea id="carNote" placeholder="Salondan xüsusi qeyd"></textarea></div>
            <div class="field"><label>Təsvir</label><textarea id="carDescription" placeholder="Ətraflı məlumat"></textarea></div>
            <div class="filter-actions">
              <button class="btn" type="submit">Yadda saxla</button>
              <button class="btn btn-outline" type="button" id="clearListingForm">Təmizlə</button>
            </div>
            <p id="adminMsg" class="muted"></p>
          </form>
        </section>

        <section class="table-card">
          <h3>Mövcud elanlar</h3>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th>Avto</th><th>Qiymət</th><th>İl</th><th>Əməliyyat</th></tr></thead>
              <tbody id="adminListingTable"></tbody>
            </table>
          </div>
        </section>
      </div>

      <section class="table-card" style="margin-top:14px;">
        <div class="section-head"><h3>İstifadəçilər</h3><span class="badge">Şifrələr təhlükəsizlik səbəbi ilə görünmür</span></div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Ad Soyad</th><th>Telefon</th><th>Email</th><th>Rol</th><th>Əməliyyat</th></tr></thead>
            <tbody id="adminUsersTable"></tbody>
          </table>
        </div>
      </section>

      <section class="table-card" style="margin-top:14px;">
        <div class="section-head"><h3>Canlı çat - admin görünüşü</h3></div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Göndərən</th><th>Mesaj</th><th>Tarix</th></tr></thead>
            <tbody id="adminMessagesTable"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
