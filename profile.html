<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil - ELİT AVTO 777</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/logo.png" alt="ELİT AVTO 777">
        <div><h2>ELİT AVTO 777</h2><p>Şəxsi kabinet</p></div>
      </a>
      <div class="header-actions"><button class="btn btn-outline btn-small" id="logoutBtn">Çıxış</button></div>
    </div>
  </header>

  <main class="page">
    <div class="container profile-grid">
      <section class="sidebar-card">
        <h3>Profil şəkli</h3>
        <div class="main-photo" style="aspect-ratio:1/1;max-width:260px;margin-top:12px;">
          <img id="avatarPreview" src="foto/user-placeholder.png" alt="Profil şəkli">
        </div>
        <div class="field" style="margin-top:12px;">
          <label>Avatar yüklə</label>
          <input type="file" id="avatarInput" accept="image/*">
        </div>
      </section>

      <section class="form-card">
        <h3>Profil məlumatları</h3>
        <form id="profileForm">
          <div class="field-inline">
            <div class="field"><label>Ad</label><input id="profileName" type="text"></div>
            <div class="field"><label>Soyad</label><input id="profileSurname" type="text"></div>
          </div>
          <div class="field-inline">
            <div class="field"><label>Email</label><input id="profileEmail" type="email" disabled></div>
            <div class="field"><label>Telefon</label><input id="profilePhone" type="tel"></div>
          </div>
          <div class="field"><label>Ünvan</label><input id="profileAddress" type="text"></div>
          <div class="field"><label>Haqqında</label><textarea id="profileBio"></textarea></div>
          <div class="filter-actions">
            <button class="btn" type="submit">Yadda saxla</button>
            <button class="btn btn-outline" id="resetPasswordBtn" type="button">Şifrə sıfırlama emaili</button>
          </div>
          <p class="muted">Təhlükəsizlik üçün istifadəçi şifrələri açıq şəkildə saxlanmır və görünmür.</p>
          <p id="profileMsg" class="muted"></p>
        </form>
      </section>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="container nav-row">
      <a href="sevimliler.html"><i class="fa-regular fa-heart"></i><strong>Sevimlilər</strong></a>
      <a href="mesajlar.html"><i class="fa-regular fa-message"></i><strong>Mesaj</strong></a>
      <a href="index.html"><span class="home-fab"><i class="fa-solid fa-house"></i></span><strong>Əsas</strong></a>
      <a href="profile.html"><i class="fa-solid fa-user"></i><strong>Profil</strong></a>
      <a href="https://wa.me/994517089500?text=Salam,%20EL%C4%B0T%20AVTO%20777-d%C9%99ki%20elanla%20ba%C4%9Fl%C4%B1%20sual%C4%B1m%20var..." target="_blank"><i class="fa-brands fa-whatsapp"></i><strong>WhatsApp</strong></a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
