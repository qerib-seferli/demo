<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Profil | ELİT AVTO 777</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profile">
  <header class="topbar" id="site-header"></header>

  <main class="page-shell">
    <section class="profile-card">
      <div class="avatar-wrap">
        <div class="avatar"><img id="profile-avatar" src="foto/elit_avto_777_logo.png" alt=""></div>
        <div>
          <h1 class="hero-title" style="font-size:24px;margin-bottom:6px;">Profilim</h1>
          <p class="hero-text">Şəxsi məlumatlarınızı redaktə edin.</p>
        </div>
      </div>

      <form id="profile-form" class="search-box">
        <input type="file" id="avatar-file" accept="image/*">
        <input type="text" name="full_name" placeholder="Ad Soyad">
        <input type="tel" name="phone" placeholder="Telefon nömrəsi">
        <input type="email" name="email" placeholder="Email" disabled>
        <input type="text" name="address" placeholder="Ünvan">
        <button class="pill-btn" type="submit">Yadda saxla</button>
        <button class="pill-btn soft-btn" type="button" id="logout-btn">Çıxış et</button>
      </form>
    </section>

    <section class="profile-card" style="margin-top:14px;">
      <div class="section-title">
        <h2>Şifrəni dəyişmək</h2>
      </div>
      <div class="search-box">
        <input type="email" id="password-reset-email" placeholder="Email" disabled>
        <button class="pill-btn" id="send-reset-from-profile">Sıfırlama linki göndər</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" id="bottom-nav"></nav>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
