<body data-page="profile">
  <header class="topbar glass sticky-top">
    <div class="topbar-inner container">
      <a class="brand" href="index.html">
        <img src="foto/elit_avto_777_logo.png" alt="ELİT AVTO 777" class="brand-logo" onerror="this.style.display='none'">
        <div>
          <strong>ELİT AVTO 777</strong>
          <span>Şəxsi kabinet</span>
        </div>
      </a>
      <div class="topbar-actions">
        <a class="icon-btn hidden" id="adminShortcut" href="admin.html"><i class="fa-solid fa-shield-halved"></i></a>
      </div>
    </div>
  </header>

  <main class="page narrow-page with-bottom-nav">
    <section class="profile-shell container">
      <div class="profile-card">
        <div class="avatar-wrap">
          <img id="profileAvatarPreview" src="https://placehold.co/160x160/png?text=User" alt="Profil şəkli" class="avatar-preview">
          <div>
            <h1 id="profileTitle">Profil</h1>
            <p class="muted">Profil məlumatlarınızı buradan redaktə edin.</p>
          </div>
        </div>

        <form id="profileForm" class="form-stack">
          <label class="field"><span>Profil şəkli URL</span><input type="url" name="avatar_url" placeholder="https://..."></label>
          <label class="field"><span>Ad Soyad</span><input type="text" name="full_name" required></label>
          <label class="field"><span>Telefon</span><input type="tel" name="phone" placeholder="+994..."></label>
          <label class="field"><span>Email</span><input type="email" name="email" disabled></label>
          <label class="field"><span>Ünvan</span><input type="text" name="address"></label>
          <button type="submit" class="primary-btn">Dəyişiklikləri yadda saxla</button>
        </form>

        <div class="danger-box">
          <h3>Şifrəni dəyişmək</h3>
          <p class="muted">Təhlükəsizlik səbəbi ilə mövcud şifrə görünmür və admin də görə bilməz. Buradan sıfırlama emaili göndərilir.</p>
          <button class="ghost-btn" id="profileResetPasswordBtn">Şifrə sıfırlama linki göndər</button>
        </div>

        <button class="danger-btn" id="logoutBtn">Çıxış et</button>
      </div>
    </section>
