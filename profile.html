  <header class="site-header">
    <div class="container header-row compact-header">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="foto/elit_avto_777_logo.png" alt="ELİT AVTO 777">
        <div><h2>ELİT AVTO 777</h2><p>Şəxsi kabinet</p></div>
      </a>
      <div class="header-actions"><button class="btn btn-outline btn-small" id="logoutBtn">Çıxış</button></div>
    </div>
  </header>

  
  <main class="page">
  <div class="container profile-page-shell">
    <section class="form-card profile-main-card">
      <div class="profile-hero-top">
        <div class="profile-avatar-stage">
          <div class="profile-avatar-ring ring-one"></div>
          <div class="profile-avatar-ring ring-two"></div>

          <div class="profile-avatar-box profile-avatar-box-pro">
            <img id="avatarPreview" src="foto/user-placeholder.png" alt="Profil şəkli">
          </div>
        </div>

        <div class="profile-upload-inline">
          <label for="avatarInput" class="btn btn-outline btn-small">
            <i class="fa-regular fa-image"></i> Şəkil seç
          </label>
          <input type="file" id="avatarInput" accept="image/*" hidden>
          <p class="muted small-text">Qalereyadan şəkil seçib profilə yükləyə bilərsiniz.</p>
        </div>
      </div>

      <div class="profile-form-wrap">
        <h3>Profil məlumatları</h3>

        <form id="profileForm" class="compact-form-stack">
          <div class="field-inline mobile-single-inline">
            <div class="field"><label>Ad</label><input id="profileName" type="text"></div>
            <div class="field"><label>Soyad</label><input id="profileSurname" type="text"></div>
          </div>

          <div class="field-inline mobile-single-inline">
            <div class="field"><label>Email</label><input id="profileEmail" type="email" disabled></div>
            <div class="field"><label>Telefon</label><input id="profilePhone" type="tel" placeholder="+994501112233"></div>
          </div>

          <div class="field"><label>Ünvan</label><input id="profileAddress" type="text"></div>
          <div class="field"><label>Haqqında</label><textarea id="profileBio" placeholder="Qısa məlumat"></textarea></div>

          <div class="filter-actions profile-actions-stack">
            <button class="btn" type="submit">Yadda saxla</button>
            <button class="btn btn-outline" id="resetPasswordBtn" type="button">Şifrə yenilə</button>
          </div>

          <p class="muted">Şifrə açıq görünmür. Yeniləmə üçün email vasitəsilə sıfırlama linki göndərilir.</p>
          <p id="profileMsg" class="muted"></p>
        </form>
      </div>
    </section>
  </div>
</main>
